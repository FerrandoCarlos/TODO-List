<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TODO List </title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  <body class="bg-slate-100 min-h-screen flex flex-col"> 
    <nav class="bg-blue-700 text-white px-6 py-4">
      <h1 class="text-xl font-extrabold">📝 TODO List</h1>
    </nav>
    <main class="w-full max-w-2xl mx-auto px-4 py-8 flex-1">
      <h1 class="text-3xl font-bold text-slate-800 mb-6">Mi Lista </h1>
      <form class="flex gap-2 mb-8" id="form-agregar">
        <input class="flex-1 border border-slate-300 rounded-lg px-4 py-2 text-slate-700 focus:outline-none" type="text" id="input-tarea" placeholder="Nueva tarea...">
        <button class="bg-blue-600 text-white font-semibold px-4 py-2 rounded-lg hover:bg-blue-700 transition-colors" type="submit">Agregar</button>
      </form>
      <ul class="flex flex-col gap-3" id="lista-todos"></ul>
    </main>
    <footer class="bg-white border-t border-slate-200 py-4 text-center text-slate-400 text-sm">
      <p>&copy; MiloDev</p>
    </footer>
  </body>
</html>
